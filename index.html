<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D跳一跳</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;user-select:none}
body{overflow:hidden;background:#121220}
canvas{display:block;width:100vw;height:100vh}
.score{position:fixed;top:20px;left:20px;color:#fff;font-size:30px;font-weight:bold;text-shadow:0 0 10px #fff;z-index:10}
.power-bar{position:fixed;bottom:60px;left:50%;transform:translateX(-50%);width:260px;height:14px;background:rgba(255,255,255,.15);border-radius:7px;overflow:hidden;z-index:10}
.power{height:100%;background:linear-gradient(90deg,#54a0ff,#00d2d3);width:0%;transition:width 0.04s}
.tips{position:fixed;bottom:90px;left:50%;color:rgba(255,255,255,.7);font-size:14px;z-index:10}
.over{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);color:#fff;font-size:42px;font-weight:bold;text-align:center;display:none;text-shadow:0 0 20px red;z-index:20}
.restart{margin-top:20px;padding:12px 26px;background:#ff4757;border:none;color:#fff;border-radius:6px;font-size:18px;cursor-pointer}
</style>
</head>
<body>
<div class="score">0</div>
<div class="tips">长按蓄力 · 松开跳跃</div>
<div class="power-bar"><div class="power"></div></div>
<div class="over">游戏结束<br><button class="restart">再来一局</button></div>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
<script>
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(60, innerWidth/innerHeight, 0.1, 2000);
const renderer = new THREE.WebGLRenderer({antialias:true});
document.body.appendChild(renderer.domElement);
renderer.setSize(innerWidth,innerHeight);
renderer.shadowMap.enabled = true;
scene.background = new THREE.Color(0x121220);

const light = new THREE.DirectionalLight(0xffffff, 1);
light.position.set(10,20,10);
light.castShadow = true;
scene.add(light, new THREE.AmbientLight(0xffffff, 0.5));

let player;
let platforms = [];
let score = 0;
let isCharging = false;
let power = 0;
const maxPower = 100;
let isJumping = false;
let current = 0;

// ========== 3D小人（替换丑豆子！） ==========
function createPlayer() {
    player = new THREE.Group();
    scene.add(player);

    // 身体
    const bodyMat = new THREE.MeshStandardMaterial({ color: 0xff6b6b });
    const body = new THREE.Mesh(new THREE.CylinderGeometry(0.25, 0.35, 0.8, 6), bodyMat);
    body.position.y = 0.4;
    body.castShadow = true;
    
    // 头
    const head = new THREE.Mesh(new THREE.SphereGeometry(0.3, 8, 6), bodyMat);
    head.position.y = 1.1;
    head.castShadow = true;

    player.add(body, head);
    player.position.set(0, 0, 0);
}

// ========== 生成难度递增平台 ==========
function createPlatforms() {
    platforms.forEach(p => scene.remove(p));
    platforms = [];
    let x = 0, z = 0;
    for (let i = 0; i < 80; i++) {
        const base = 2.3 + Math.min(score * 0.07, 2.5);
        const dist = base + Math.random() * 2.5;
        x += dist;
        z += (Math.random() - 0.5) * (1 + Math.min(score * 0.04, 1.5));
        
        const mat = new THREE.MeshStandardMaterial({ color: i%2 ? 0x48dbfb : 0x00d2d3 });
        const p = new THREE.Mesh(new THREE.BoxGeometry(2, 0.5, 2), mat);
        p.position.set(x, 0, z);
        p.receiveShadow = true;
        scene.add(p);
        platforms.push(p);
    }
    player.position.copy(platforms[0].position).y += 1;
    current = 0;
    updateScore();
}

function updateScore() { document.querySelector('.score').innerText = score }
function updatePower() { document.querySelector('.power').style.width = (power / maxPower * 100) + '%' }

// ========== 丝滑抛物线跳跃（无卡顿！） ==========
function jump() {
    if (isJumping || !platforms[current + 1]) return;
    isJumping = true;
    const jumpPower = power * 0.085;
    power = 0; updatePower();

    const start = player.position.clone();
    const target = platforms[current + 1];
    const dir = target.position.clone().sub(start).normalize();
    const end = start.clone().add(dir.multiplyScalar(jumpPower));
    end.y = 1;

    let t = 0;
    const h = 3.3;

    function animateJump() {
        if (t > 1) {
            player.position.copy(end);
            if (player.position.distanceTo(target.position) < 1.6) {
                score++; current++; isJumping = false; updateScore();
            } else { gameOver() }
            return;
        }

        t += 0.018;
        player.position.lerpVectors(start, end, t);
        player.position.y = start.y + Math.sin(Math.PI * t) * h;
        requestAnimationFrame(animateJump);
    }
    animateJump();
}

function gameOver() { isJumping = true; document.querySelector('.over').style.display = "block" }
function reset() {
    score = power = current = 0;
    isJumping = isCharging = false;
    updatePower();
    document.querySelector('.over').style.display = "none";
    createPlatforms();
}

// 操作
window.addEventListener('mousedown', () => { if (!isJumping) isCharging = true });
window.addEventListener('mouseup', () => { if (isCharging) { isCharging = false; jump() } });
window.addEventListener('touchstart', e => e.preventDefault());
window.addEventListener('touchstart', () => { if (!isJumping) isCharging = true });
window.addEventListener('touchend', () => { if (isCharging) { isCharging = false; jump() } });
document.querySelector('.restart').onclick = reset;

// 主循环
function loop() {
    requestAnimationFrame(loop);
    if (isCharging && power < maxPower) { power += 1.3; updatePower() }
    if (platforms[current]) {
        const pos = platforms[current].position;
        camera.position.lerp(new THREE.Vector3(pos.x - 8, 6, pos.z - 8), 0.09);
        camera.lookAt(pos);
    }
    renderer.render(scene, camera);
}

createPlayer();
createPlatforms();
loop();

window.onresize = () => {
    camera.aspect = innerWidth / innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(innerWidth, innerHeight);
}
</script>
</body>
</html>
