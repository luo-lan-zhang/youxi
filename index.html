<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0, minimum-scale=1.0">
    <title>3D贪吃蛇 - 仿微信版</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: Arial, sans-serif; 
            background: linear-gradient(to bottom, #1a1a2e, #16213e);
            min-height: 100vh; 
            overflow: hidden;
        }
        #game-container {
            width: 100%;
            height: 100vh;
            max-width: 500px;
            max-height: 700px;
            margin: 0 auto;
            position: relative;
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.2);
            overflow: hidden;
        }
        canvas {
            display: block;
            width: 100%;
            height: 100%;
            touch-action: none;
        }
        .score-ui {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: white;
            font-size: 24px;
            font-weight: bold;
            text-shadow: 1px 2px 4px rgba(0,0,0,0.5);
            z-index: 10;
        }
        .tip-ui {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255,255,255,0.7);
            font-size: 14px;
            z-index: 10;
        }
    </style>
</head>
<body>
    <div id="game-container">
        <div class="score-ui">得分: <span id="score">0</span></div>
        <div class="tip-ui">滑动屏幕控制方向 | 电脑用方向键</div>
    </div>

    <!-- 引入3D渲染库，用国内CDN，GitHub也能加载到 -->
    <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
    <script>
        // --------------- 3D场景初始化 ---------------
        let scene, camera, renderer;
        let snake = []; // 蛇的身体
        let food; // 食物
        let direction = {x:1, y:0}; // 移动方向
        let nextDirection = {x:1, y:0};
        let gridSize = 20; // 网格大小
        let score = 0;
        let gameLoop;
        let touchStart = {x:0, y:0};

        // 初始化3D场景
        function init3D() {
            // 场景
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x87CEEB);

            // 相机，仿微信的透视视角
            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(15, 25, 15);
            camera.lookAt(0, 0, 0);

            // 渲染器
            const container = document.getElementById('game-container');
            renderer = new THREE.WebGLRenderer({antialias: true});
            renderer.setSize(container.clientWidth, container.clientHeight);
            renderer.shadowMap.enabled = true; // 开启阴影，更有3D质感
            container.appendChild(renderer.domElement);

            // 灯光，仿微信的柔和光照
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
            scene.add(ambientLight);
            const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
            directionalLight.position.set(10, 20, 10);
            directionalLight.castShadow = true;
            scene.add(directionalLight);

            // 地面
            const groundGeometry = new THREE.PlaneGeometry(40, 40);
            const groundMaterial = new THREE.MeshStandardMaterial({color: 0xeeeeee});
            const ground = new THREE.Mesh(groundGeometry, groundMaterial);
            ground.rotation.x = -Math.PI / 2;
            ground.receiveShadow = true;
            scene.add(ground);
        }

        // --------------- 贪吃蛇初始化 ---------------
        function initSnake() {
            // 清空旧的蛇
            snake.forEach(segment => scene.remove(segment));
            snake = [];

            // 初始化蛇的身体，3个方块
            for(let i=2; i>=0; i--) {
                const geometry = new THREE.BoxGeometry(gridSize-1, gridSize-1, gridSize-1);
                const material = new THREE.MeshStandardMaterial({color: 0x00ff00});
                const segment = new THREE.Mesh(geometry, material);
                segment.position.set(i*gridSize, gridSize/2, 0);
                segment.castShadow = true;
                scene.add(segment);
                snake.push(segment);
            }
        }

        // 生成食物
        function spawnFood() {
            if(food) scene.remove(food);
            // 随机位置，避开蛇的身体
            let x, z;
            do {
                x = Math.floor(Math.random()*15 - 7) * gridSize;
                z = Math.floor(Math.random()*15 - 7) * gridSize;
            } while(snake.some(s => s.position.x === x && s.position.z === z));

            const geometry = new THREE.BoxGeometry(gridSize-1, gridSize-1, gridSize-1);
            const material = new THREE.MeshStandardMaterial({color: 0xff0000});
            food = new THREE.Mesh(geometry, material);
            food.position.set(x, gridSize/2, z);
            food.castShadow = true;
            scene.add(food);
        }

        // --------------- 游戏逻辑 ---------------
        function moveSnake() {
            // 更新方向
            direction = {...nextDirection};

            // 新的头的位置
            const head = snake[0];
            const newHead = new THREE.Mesh(
                new THREE.BoxGeometry(gridSize-1, gridSize-1, gridSize-1),
                new THREE.MeshStandardMaterial({color: 0x00ff00})
            );
            newHead.position.set(
                head.position.x + direction.x * gridSize,
                gridSize/2,
                head.position.z + direction.y * gridSize
            );
            newHead.castShadow = true;
            scene.add(newHead);
            snake.unshift(newHead);

            // 检测是否吃到食物
            if(newHead.position.x === food.position.x && newHead.position.z === food.position.z) {
                score++;
                document.getElementById('score').textContent = score;
                spawnFood();
            } else {
                // 没吃到，删掉尾巴
                const tail = snake.pop();
                scene.remove(tail);
            }

            // 检测碰撞：撞墙或者撞自己
            if(checkCollision()) {
                alert(`游戏结束！得分: ${score}\n点击确定重新开始`);
                resetGame();
            }
        }

        // 碰撞检测
        function checkCollision() {
            const head = snake[0];
            // 撞墙
            if(head.position.x < -140 || head.position.x > 140 || head.position.z < -140 || head.position.z > 140) {
                return true;
            }
            // 撞自己
            for(let i=1; i<snake.length; i++) {
                if(head.position.x === snake[i].position.x && head.position.z === snake[i].position.z) {
                    return true;
                }
            }
            return false;
        }

        // 重置游戏
        function resetGame() {
            clearInterval(gameLoop);
            score = 0;
            document.getElementById('score').textContent = 0;
            direction = {x:1, y:0};
            nextDirection = {x:1, y:0};
            initSnake();
            spawnFood();
            gameLoop = setInterval(moveSnake, 200); // 游戏速度，仿微信
        }

        // --------------- 控制逻辑 ---------------
        // 电脑键盘控制
        document.addEventListener('keydown', (e) => {
            switch(e.key) {
                case 'ArrowUp':
                    if(direction.y !== 1) nextDirection = {x:0, y:-1};
                    break;
                case 'ArrowDown':
                    if(direction.y !== -1) nextDirection = {x:0, y:1};
                    break;
                case 'ArrowLeft':
                    if(direction.x !== 1) nextDirection = {x:-1, y:0};
                    break;
                case 'ArrowRight':
                    if(direction.x !== -1) nextDirection = {x:1, y:0};
                    break;
            }
        });

        // 手机触摸滑动控制
        document.addEventListener('touchstart', (e) => {
            touchStart.x = e.touches[0].clientX;
            touchStart.y = e.touches[0].clientY;
        });
        document.addEventListener('touchend', (e) => {
            const dx = e.changedTouches[0].clientX - touchStart.x;
            const dy = e.changedTouches[0].clientY - touchStart.y;
            // 判断滑动方向
            if(Math.abs(dx) > Math.abs(dy)) {
                // 水平滑动
                if(dx > 0 && direction.x !== -1) nextDirection = {x:1, y:0};
                else if(dx < 0 && direction.x !== 1) nextDirection = {x:-1, y:0};
            } else {
                // 垂直滑动
                if(dy > 0 && direction.y !== -1) nextDirection = {x:0, y:1};
                else if(dy < 0 && direction.y !== 1) nextDirection = {x:0, y:-1};
            }
        });

        // 渲染循环
        function animate() {
            requestAnimationFrame(animate);
            renderer.render(scene, camera);
        }

        // 初始化游戏
        window.onload = function() {
            init3D();
            initSnake();
            spawnFood();
            gameLoop = setInterval(moveSnake, 200);
            animate();
        };

        // 窗口大小适配
        window.addEventListener('resize', () => {
            const container = document.getElementById('game-container');
            camera.aspect = container.clientWidth / container.clientHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(container.clientWidth, container.clientHeight);
        });
    </script>
</body>
</html>
