<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>跳一跳 - 温暖治愈版</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <!-- 开始界面 -->
    <div id="start-screen" class="screen">
        <div class="title-container">
            <h1 class="game-title">跳一跳</h1>
            <p class="subtitle">温暖治愈版</p>
        </div>
        <div class="character-preview">
            <div class="preview-character"></div>
        </div>
        <button id="start-btn" class="btn btn-primary">
            <span>开始游戏</span>
        </button>
        <div class="instructions">
            <p>点击或触摸屏幕蓄力</p>
            <p>松开后跳跃</p>
            <p>跳到方块中心得分翻倍</p>
        </div>
        <div class="best-score-display">
            <span>最高分：</span>
            <span id="best-score-value">0</span>
        </div>
    </div>

    <!-- 游戏界面 -->
    <div id="game-screen" class="screen hidden">
        <canvas id="game-canvas"></canvas>
        
        <!-- 游戏UI覆盖层 -->
        <div id="game-ui">
            <div class="score-container">
                <span id="current-score">0</span>
            </div>
            <div class="power-bar-container hidden" id="power-container">
                <div class="power-bar">
                    <div class="power-fill" id="power-fill"></div>
                </div>
            </div>
        </div>

        <!-- 连击提示 -->
        <div id="combo-text" class="combo-text hidden">
            <span id="combo-value"></span>
        </div>

        <!-- 粒子容器 -->
        <div id="particles-container"></div>
    </div>

    <!-- 游戏结束界面 -->
    <div id="game-over-screen" class="screen hidden
