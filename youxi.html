<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>跳一跳</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial}
body{background:#111;color:#fff;text-align:center;padding:20px}
#game{background:#222;width:100%;max-width:800px;height:400px;margin:20px auto;position:relative;border:2px solid #fff}
#powerBar{width:200px;height:10px;background:#0f0;position:absolute;bottom:20px;left:50%;transform:translateX(-50%);width:0%}
#jumpBtn{position:absolute;bottom:20px;right:20px;padding:10px 20px;background:red;color:#fff;border:none;font-size:18px}
#level{position:absolute;top:10px;left:10px;font-size:20px}
#maxLevel{position:absolute;top:10px;right:10px;font-size:20px}
button{margin:5px;padding:8px 16px}
</style>
</head>

<body>
<h1>跳一跳</h1>
<div id="level">第 1 关</div>
<div id="maxLevel">已解锁：1 关</div>
<div id="game">
<canvas id="c" width="800" height="400"></canvas>
<div id="powerBar"></div>
<button id="jumpBtn">按住跳跃</button>
</div>
<button onclick="reset()">重新开始</button>
<button onclick="goHome()">返回首页</button>

<script>
let canvas = document.getElementById('c');
let ctx = canvas.getContext('2d');
let level = 1;
let maxLv = 1;
let power = 0;
let isJump = false;
let pwr;
let player = {x:100,y:300,w:30,h:30};
let platform = [];

function draw(){
ctx.clearRect(0,0,800,400);
ctx.fillStyle='#0f0';
platform.forEach(p=>ctx.fillRect(p.x,p.y,p.w,p.h));
ctx.fillStyle='#f0f';
ctx.fillRect(player.x,player.y,player.w,player.h);
}

function init(){
player.x=100;player.y=300;
let g = 150 + level*25;
platform=[{x:50,y:330,w:150,h:30},{x:50+g,y:330,w:150,h:30}];
power=0;
document.getElementById('powerBar').style.width='0%';
document.getElementById('level').innerText='第 '+level+' 关';
draw();
}

let btn = document.getElementById('jumpBtn');
btn.onmousedown = ()=>{if(isJump)return; pwr=setInterval(()=>{power=Math.min(power+2,100); document.getElementById('powerBar').style.width=power+'%'},20)}
btn.onmouseup = ()=>{clearInterval(pwr); jump()}

function jump(){
if(isJump||power==0)return;
isJump=true;
let sx=player.x;
let t=0;
let j=setInterval(()=>{
t+=0.05;
player.x=sx+power*3*t;
player.y=300-Math.sin(Math.PI*t)*100;
draw();
if(t>=1){
clearInterval(j);
player.y=300;
isJump=false;
check();
}
},20);
}

function check(){
let tar=platform[1];
if(player.x+30>tar.x&&player.x<tar.x+150){
if(level>=maxLv)maxLv=level+1;
localStorage.setItem('max',maxLv);
document.getElementById('maxLevel').innerText='已解锁：'+maxLv+' 关';
if(level==10){alert('恭喜通关！');return;}
alert('通关！'); level++; init();
}else{
alert('掉下去了！'); init();
}
}

function reset(){init()}
function goHome(){alert('返回首页')}

window.onload=()=>{
let m=localStorage.getItem('max');
if(m)maxLv=parseInt(m);
document.getElementById('maxLevel').innerText='已解锁：'+maxLv+' 关';
init();
}
</script>
</body>
</html>
