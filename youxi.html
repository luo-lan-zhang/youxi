<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>跳一跳</title>
</head>
<body style="background:#000; color:#fff; text-align:center;">
    <h1>跳一跳</h1>
    <p>按住按钮蓄力，松开跳跃</p>
    <canvas id="gameCanvas" width="300" height="400" style="background:#222; display:block; margin:10px auto;"></canvas>
    <button id="jumpBtn" style="padding:10px 20px; font-size:16px;">按住跳跃</button>
    <p id="levelText">第 1 关</p>

<script>
// 超简单跳一跳，GitHub 100% 可运行
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const jumpBtn = document.getElementById('jumpBtn');
const levelText = document.getElementById('levelText');

let level = 1;
let power = 0;
let isJumping = false;
let powerInterval;

let player = { x: 50, y: 300, w: 20, h: 20 };
let platform1 = { x: 30, y: 320, w: 80, h: 20 };
let platform2 = { x: 180, y: 320, w: 80, h: 20 };

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = "#0f0";
    ctx.fillRect(platform1.x, platform1.y, platform1.w, platform1.h);
    ctx.fillRect(platform2.x, platform2.y, platform2.w, platform2.h);
    ctx.fillStyle = "#f0f";
    ctx.fillRect(player.x, player.y, player.w, player.h);
}

function resetPlayer() {
    player.x = 50;
    player.y = 300;
    power = 0;
    isJumping = false;
    draw();
}

jumpBtn.onmousedown = function() {
    if (isJumping) return;
    powerInterval = setInterval(() => {
        power = Math.min(power + 1, 100);
    }, 30);
};

jumpBtn.onmouseup = function() {
    clearInterval(powerInterval);
    if (isJumping || power === 0) return;
    jump();
};

function jump() {
    isJumping = true;
    let startX = player.x;
    let time = 0;
    let jumpInterval = setInterval(() => {
        time++;
        player.x = startX + power * 2 * (time / 20);
        let y = Math.sin(time / 20 * Math.PI) * 60;
        player.y = 300 - y;
        draw();
        if (time >= 20) {
            clearInterval(jumpInterval);
            player.y = 300;
            checkWin();
            isJumping = false;
            power = 0;
        }
    }, 30);
}

function checkWin() {
    if (player.x > platform2.x && player.x < platform2.x + platform2.w) {
        alert("过关成功！");
        level++;
        levelText.innerText = "第 " + level + " 关";
        platform2.x += 30;
    } else {
        alert("掉下去了！");
    }
    resetPlayer();
}

draw();
</script>
</body>
</html>
